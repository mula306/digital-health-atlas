services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dhatlas-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd!}
    ports:
      - "1433:1433"
    volumes:
      - dhatlas_sql_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  dhatlas_sql_data:
